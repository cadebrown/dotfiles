# aider model behavior settings — schema: https://aider.chat/docs/config/adv-model-settings.html
# Only models that need non-default behavior live here. Cloud models use aider's
# built-in litellm metadata.

# Local Qwen3.6-27B 8-bit via mlxserve (mlx-openai-server on :8080).
#   - edit_format: whole — Ivan Fioravanti's MLX Qwen aider benchmarks show
#     `whole` produces fewer malformed edits than `diff` on locally-served Qwen.
#     27B's native 256K context absorbs full-file resends comfortably.
#   - extra_params.api_base — routes ONLY this model to localhost; cloud
#     aliases (sonnet/opus/gpt5) keep their real endpoints.
#   - Qwen3.6 is reasoning-tuned (thinks in <think> blocks); the
#     mlx-openai-server reasoning_parser strips them so they don't leak into
#     diff output.
- name: openai/qwen3.6-27b
  edit_format: whole
  editor_edit_format: whole
  use_repo_map: true
  use_temperature: 0.7
  streaming: true
  use_system_prompt: true
  extra_params:
    api_base: http://localhost:8080/v1
    api_key: not-needed       # litellm refuses empty key; mlx server ignores
    max_tokens: 32000
    top_p: 0.8
    top_k: 20
