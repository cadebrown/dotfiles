# .aerospace.toml - AeroSpace v2 (direct hotkeys, no hardcoded routing)

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# false: `true` re-shows macOS-hidden apps, which collides with iTerm2's pinned
# hotkey-window hide/focus semantics on click-off and contributed to the
# hotkey-window focus bug (window visible on top but keystrokes land behind it).
# Flip to a scoped exceptions list if you rely on cmd-h unhide workflows.
automatically-unhide-macos-hidden-apps = false
on-focused-monitor-changed = []

# Float iTerm2's F12 hotkey (dropdown) window instead of tiling it. Root-cause
# fix for the focus bug: without this, AeroSpace pulls the LSUIElement hotkey
# window into its tiling tree and wins the macOS key-window race, so the window
# floats visually on top but typed text goes to the window behind it; F12 toggle
# and click-off then desync focus. Scoped by title so REGULAR iTerm windows stay
# tiled (the hotkey profile is named "HotkeyWindow" in the iTerm2 plist).
# Verify the live title with `aerospace list-windows --all` while the hotkey
# window is open; if it doesn't contain "Hotkey", widen the regex or drop the
# title line to float all iTerm2 windows.
[[on-window-detected]]
    if.app-id = 'com.googlecode.iterm2'
    if.window-title-regex-substring = 'Hotkey'
    run = ['layout floating']

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical = 0
    outer.left = 0
    outer.bottom = 0
    outer.top = 0
    outer.right = 0

[mode.main.binding]
    # Layout and sizing
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Fullscreen controls
    alt-f = 'fullscreen'
    alt-shift-f = 'macos-native-fullscreen'

    # Focus window
    alt-left = 'focus left'
    alt-down = 'focus down'
    alt-up = 'focus up'
    alt-right = 'focus right'

    # Move window
    alt-shift-left = 'move left'
    alt-shift-down = 'move down'
    alt-shift-up = 'move up'
    alt-shift-right = 'move right'

    # Structural joins
    cmd-alt-left = 'join-with left'
    cmd-alt-down = 'join-with down'
    cmd-alt-up = 'join-with up'
    cmd-alt-right = 'join-with right'

    # Workspace navigation
    alt-tab = 'workspace-back-and-forth'
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # Move node to workspace and follow
    alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
    alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
    alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
    alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
    alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
    alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
    alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
    alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
    alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

    # Move node to workspace without following
    cmd-alt-1 = 'move-node-to-workspace 1'
    cmd-alt-2 = 'move-node-to-workspace 2'
    cmd-alt-3 = 'move-node-to-workspace 3'
    cmd-alt-4 = 'move-node-to-workspace 4'
    cmd-alt-5 = 'move-node-to-workspace 5'
    cmd-alt-6 = 'move-node-to-workspace 6'
    cmd-alt-7 = 'move-node-to-workspace 7'
    cmd-alt-8 = 'move-node-to-workspace 8'
    cmd-alt-9 = 'move-node-to-workspace 9'

    # Monitor focus and node/workspace transport
    alt-pageUp = 'focus-monitor --wrap-around next'
    alt-pageDown = 'focus-monitor --wrap-around prev'
    alt-shift-pageUp = 'move-node-to-monitor --wrap-around next'
    alt-shift-pageDown = 'move-node-to-monitor --wrap-around prev'
    alt-shift-ctrl-pageUp = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-ctrl-pageDown = 'move-workspace-to-monitor --wrap-around prev'

    # Service mode
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']
