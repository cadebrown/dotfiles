#:schema https://developers.openai.com/codex/config-schema.json
# The create_private_ source attributes preserve installer-owned contents and mode 0600.

model = "gpt-5.6-sol"
review_model = "gpt-5.6-sol"
model_reasoning_effort = "high"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
personality = "pragmatic"

web_search = "live"
# Full-auto local mode: no filesystem/network sandbox and no approval prompts.
# The chezmoi source guard remains active as a correctness check, not a prompt.
default_permissions = ":danger-full-access"
approval_policy = "never"
file_opener = "none"

project_doc_max_bytes = 32768
# Cap stored tool/function output in history (token budget per output) —
# the context-side analog of Claude's MAX_MCP_OUTPUT_TOKENS/BASH_MAX_OUTPUT_LENGTH.
tool_output_token_limit = 10000
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md"]

[features]
# Native session-learning memories (markdown under ~/.codex/memories/).
# Codex-local L1 analog; cross-tool memory lives in ~/kb + cass (memory.sh).
memories = true

[history]
persistence = "save-all"
max_bytes = 104857600

[tools.web_search]
context_size = "high"

# Apps/connectors have gates separate from the shell approval policy.
[apps._default]
default_tools_approval_mode = "approve"
default_tools_enabled = true
destructive_enabled = true
open_world_enabled = true

# [mcp_servers.*] blocks are generated at sync time from packages/mcp-servers.txt
# (shared with install/claude.sh). See install/codex.sh:_emit_mcp_blocks_to.

[tui]
theme = "neon-noir"
alternate_screen = "never"
animations = true
notifications = ["agent-turn-complete", "approval-requested"]
notification_condition = "unfocused"
notification_method = "auto"
show_tooltips = false
session_picker_view = "dense"

# Status line: matches the Claude statusline's left-to-right narrative as
# closely as Codex's declarative vocabulary allows.
#   dir → branch → model+reasoning → ctx/token visual bars → rate-limits → fast-mode
# Codex's status_line is component-list (no script support) so we lose:
#   - per-piece colors (theme drives all colors)
#   - custom glyphs (Δ, λ — components render as their own labels)
#   - git diff/status counts (only branch name available)
#   - turns/tools/cost (no analog in Codex vocabulary)
# Invalid component names are silently skipped — verify with interactive launch.
status_line = [
    "current-dir",
    "git-branch",
    "model-with-reasoning",
    "context-used",
    "total-input-tokens",
    "total-output-tokens",
    "five-hour-limit",
    "fast-mode",
    "thread-title",
]
status_line_use_colors = true

# Tab/window title: project + model only (Claude doesn't customize this; we
# drop activity/run-state for a quieter tab bar).
terminal_title = ["project", "model"]

# Profiles (Codex 0.134+): delta-only overlay files at ~/.codex/<name>.config.toml
# with TOP-LEVEL keys — the old [profiles.*] tables in this file are no longer
# read. Managed sources: home/dot_codex/{deep,review,fast}.config.toml.
#   -p deep    Sol at extra-high reasoning, medium verbosity
#   -p review  Sol at extra-high reasoning, read-only permissions
#   -p fast    Luna at low reasoning, full-access permissions
# (The former `bootstrap`/`unrestricted` profiles were deltas of deep/base —
# dropped rather than migrated.)

# Project trust levels are added here by codex at runtime — not managed by chezmoi.
# (chezmoi uses create_ prefix for this file: written once; install/codex.sh
# sync-config regenerates it from this template + packages/mcp-servers.txt,
# preserving runtime sections.)
