model = "gpt-5-codex"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"

web_search = "live"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

project_doc_max_bytes = 32768
project_doc_fallback_filenames = ["CLAUDE.md"]

[features]
personality = true
shell_snapshot = true
unified_exec = true
undo = true

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[profiles.deep]
model = "gpt-5-codex"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.review]
model = "gpt-5-pro"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
sandbox_mode = "read-only"
approval_policy = "never"

[profiles.bootstrap]
model = "gpt-5-codex"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.fast]
model = "gpt-5-codex"
model_reasoning_effort = "low"
plan_mode_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

# Project trust levels are added here by codex at runtime — not managed by chezmoi.
# (chezmoi uses create_ prefix for this file: written once, never overwritten)
