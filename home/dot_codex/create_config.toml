#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"

web_search = "live"
sandbox_mode = "workspace-write"
approval_policy = "never"
file_opener = "none"

project_doc_max_bytes = 32768
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md"]

[features]
personality = true
shell_snapshot = true
unified_exec = true
tool_search = true
tool_suggest = true

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[history]
persistence = "save-all"
max_bytes = 104857600

[tools.web_search]
context_size = "high"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60
required = false

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 20
tool_timeout_sec = 60
required = false

[tui]
theme = "neon-noir"
alternate_screen = "never"
animations = true
notifications = ["agent-turn-complete", "approval-requested"]
notification_condition = "unfocused"
notification_method = "auto"
show_tooltips = false
session_picker_view = "dense"
status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-used", "context-window-size", "thread-title"]
status_line_use_colors = true
terminal_title = ["project-name", "activity", "run-state", "model-name"]

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "medium"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
approval_policy = "never"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "read-only"
approval_policy = "never"

[profiles.bootstrap]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
approval_policy = "never"

[profiles.fast]
model = "gpt-5.5"
model_reasoning_effort = "low"
model_verbosity = "low"
plan_mode_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "never"

[profiles.unrestricted]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "danger-full-access"
approval_policy = "never"

# Project trust levels are added here by codex at runtime — not managed by chezmoi.
# (chezmoi uses create_ prefix for this file: written once, never overwritten)
