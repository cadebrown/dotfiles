theme = "default"

[style]
mode = "plain"
separator = " │ "

# Color palette — each segment gets a distinct hue (bright variants on c16):
#   11 yellow → directory         (path / where I am)
#   10 green  → git                (branch / matches git's identity)
#   14 cyan   → model              (capability)
#    9 red    → context window     (signals fill state, draws eye when high)
#    8 gray   → session activity   (supplementary; dim by design)

[[segments]]
id = "directory"
enabled = true

[segments.icon]
plain = "▸"
nerd_font = "󰉋"

[segments.colors.icon]
c16 = 11

[segments.colors.text]
c16 = 11

[segments.styles]
text_bold = false

[segments.options]

[[segments]]
id = "git"
enabled = true

[segments.icon]
plain = "※"
nerd_font = "󰊢"

[segments.colors.icon]
c16 = 10

[segments.colors.text]
c16 = 10

[segments.styles]
text_bold = false

[segments.options]
show_sha = false

[[segments]]
id = "model"
enabled = true

[segments.icon]
plain = "✽"
nerd_font = ""

[segments.colors.icon]
c16 = 14

[segments.colors.text]
c16 = 14

[segments.styles]
text_bold = false

[segments.options]

[[segments]]
id = "context_window"
enabled = true

[segments.icon]
plain = "◐"
nerd_font = ""

[segments.colors.icon]
c16 = 9

[segments.colors.text]
c16 = 9

[segments.styles]
text_bold = false

[segments.options]

[[segments]]
id = "session"
enabled = true

[segments.icon]
plain = "#"
nerd_font = "󰮳"

[segments.colors.icon]
c16 = 8

[segments.colors.text]
c16 = 8

[segments.styles]
text_bold = false

[segments.options]
